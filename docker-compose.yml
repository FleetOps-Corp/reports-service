version: "3.9"

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  mongodb:
    image: mongo:7.0.4-alpine
    container_name: reports-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: reports_analytics
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reports-network

  minio:
    image: minio/minio:RELEASE.2024-01-31T20-46-33Z
    container_name: reports-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live || exit 1
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - reports-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: reports-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - reports-network

  # ============================================
  # Microservices
  # ============================================

  api-reportes:
    build:
      context: ./api-reportes
      dockerfile: Dockerfile
    container_name: api-reportes-service
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      APP_NAME: API Reportes
      API_HOST: 0.0.0.0
      API_PORT: 8001
      MONGODB_URL: mongodb://admin:admin123@mongodb:27017
      MONGODB_DATABASE: reports_analytics
      LOG_LEVEL: INFO
      PROMETHEUS_PORT: 8002
    ports:
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: curl -f http://localhost:8001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - reports-network
    restart: unless-stopped

  graficas-estadisticas:
    build:
      context: ./graficas-estadisticas
      dockerfile: Dockerfile
    container_name: graficas-estadisticas-service
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APP_NAME: Gráficas y Estadísticas
      API_HOST: 0.0.0.0
      API_PORT: 8002
      MONGODB_URL: mongodb://admin:admin123@mongodb:27017
      MONGODB_DATABASE: reports_analytics
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: reports
      MINIO_USE_SSL: "False"
      LOG_LEVEL: INFO
      PROMETHEUS_PORT: 8003
    ports:
      - "8003:8002"
      - "8004:8003"
    healthcheck:
      test: curl -f http://localhost:8002/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - reports-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  reports-network:
    driver: bridge
