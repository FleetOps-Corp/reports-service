"""Protocol Buffers for Maintenance Service"""
syntax = "proto3";

package maintenance;

import "google/protobuf/timestamp.proto";

service MaintenanceService {
    rpc GetMaintenanceRecords(MaintenanceRequest) returns (MaintenanceList);
}

message MaintenanceRequest {
    string location = 1;
    string maintenance_type = 2;
}

message MaintenanceResponse {
    string maintenance_id = 1;
    string vehicle_id = 2;
    string maintenance_type = 3;
    string description = 4;
    google.protobuf.Timestamp start_time = 5;
    google.protobuf.Timestamp end_time = 6;
}

message MaintenanceList {
    repeated MaintenanceResponse maintenances = 1;
}
