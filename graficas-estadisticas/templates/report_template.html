"""Template HTML para reportes PDF"""
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .header {
        background-color: #f0f0f0;
        padding: 20px;
      }
      .section {
        margin: 20px 0;
      }
      .metric {
        display: inline-block;
        margin: 10px;
        padding: 10px;
        border: 1px solid #ddd;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>{{ report_title }}</h1>
      <p>Período: {{ period_start }} a {{ period_end }}</p>
      <p>Ubicación: {{ location }}</p>
    </div>

    <div class="section">
      <h2>Métricas Clave</h2>
      {% for metric_name, value in kpis.items() %}
      <div class="metric"><strong>{{ metric_name }}:</strong> {{ value }}</div>
      {% endfor %}
    </div>

    <div class="section">
      <h2>Gráficas</h2>
      {% for chart in charts %}
      <img
        src="{{ chart.url }}"
        alt="{{ chart.title }}"
        style="width: 100%; margin: 20px 0"
      />
      {% endfor %}
    </div>
  </body>
</html>
